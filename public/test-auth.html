<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login API</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        textarea { width: 100%; height: 300px; font-family: monospace; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .section { margin: 20px 0; border: 1px solid #ccc; padding: 15px; }
    </style>
</head>
<body>
    <h1>Test Authentification PLANb</h1>
    
    <div class="section">
        <h2>Test Login - 2FA</h2>
        <p>Email: <input type="email" id="email" value="test@planb.local" style="width:250px"></p>
        <p>Password: <input type="password" id="password" value="password123" style="width:250px"></p>
        <button onclick="testLogin()" style="background-color: #4CAF50; color:white; padding:10px 20px; border:none; border-radius:4px;">🔐 Envoyer Login</button>
        <p style="color:red; font-weight:bold;">⚠️ Un code OTP à 6 chiffres doit être envoyé par email</p>
    </div>

    <div class="section">
        <h2>Test Listings (Public)</h2>
        <button onclick="testListings()">Tester /api/v1/listings</button>
    </div>

    <div class="section">
        <h2>Réponse</h2>
        <textarea id="response" readonly></textarea>
    </div>

    <div class="section">
        <h2>JWT Token</h2>
        <textarea id="jwtToken" placeholder="Sera auto-rempli après login"></textarea>
        <button onclick="testProtectedRoute()">Tester Route Protégée (/api/v1/users/1)</button>
    </div>

    <script>
        const baseUrl = 'http://localhost:8000/api/v1';
        const responseEl = document.getElementById('response');
        const jwtTokenEl = document.getElementById('jwtToken');

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const resp = await fetch(baseUrl + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await resp.json();
                responseEl.value = `Status: ${resp.status}\n\n${JSON.stringify(data, null, 2)}`;
                
                if (data.token) {
                    jwtTokenEl.value = data.token;
                }
            } catch (e) {
                responseEl.value = `Erreur: ${e.message}`;
            }
        }

        async function testListings() {
            try {
                const resp = await fetch(baseUrl + '/listings?limit=2');
                const data = await resp.json();
                responseEl.value = `Status: ${resp.status}\n\n${JSON.stringify(data, null, 2)}`;
            } catch (e) {
                responseEl.value = `Erreur: ${e.message}`;
            }
        }

        async function testProtectedRoute() {
            const token = jwtTokenEl.value.trim();
            if (!token) {
                responseEl.value = 'Erreur: Pas de JWT token trouvé';
                return;
            }

            try {
                const resp = await fetch(baseUrl + '/users/1', {
                    method: 'GET',
                    headers: { 
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'  
                    }
                });
                const data = await resp.json();
                responseEl.value = `Status: ${resp.status}\n\n${JSON.stringify(data, null, 2)}`;
            } catch (e) {
                responseEl.value = `Erreur: ${e.message}`;
            }
        }
    </script>
</body>
</html>
